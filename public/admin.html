<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - รายชื่อผู้ลงทะเบียน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+Thai:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- หน้า login -->
  <div class="container" id="loginView">
    <header class="page-head">
      <h1>เข้าสู่ระบบ Admin</h1>
    </header>
    <div class="card">
      <div id="loginMsg" class="msg"></div>
      <div class="field">
        <label>รหัสผ่าน Admin</label>
        <input type="password" id="password" autofocus />
      </div>
      <button class="btn" id="loginBtn">เข้าสู่ระบบ</button>
    </div>
  </div>

  <!-- หน้า dashboard -->
  <div class="container wide" id="dashView" style="display:none">
    <header class="page-head">
      <h1>รายชื่อผู้ลงทะเบียน</h1>
    </header>

    <div class="stats">
      <div class="stat"><div class="num" id="statTotal">0</div><div class="label">ลงทะเบียนทั้งหมด</div></div>
    </div>

    <div class="toolbar">
      <input type="text" id="search" placeholder="ค้นหา ชื่อ / อีเมล / รหัส / องค์กร" />
      <button class="btn secondary auto" id="refreshBtn">รีเฟรช</button>
      <button class="btn secondary auto" id="exportBtn">export CSV</button>
      <button class="btn secondary auto" id="logoutBtn">ออกจากระบบ</button>
    </div>

    <div id="dashMsg" class="msg"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>รหัส</th><th>ชื่อ-นามสกุล</th><th>อีเมล</th><th>เบอร์โทร</th>
            <th>องค์กร</th><th>ตำแหน่ง</th><th>รอบ</th><th>อาหาร</th>
            <th>เวลาลงทะเบียน</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
