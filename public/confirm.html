<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ลงทะเบียนสำเร็จ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+Thai:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container">
    <header class="page-head">
      <h1>🎉 ลงทะเบียนสำเร็จ</h1>
      <p>ขอบคุณที่ลงทะเบียนเข้าร่วมงาน แล้วพบกันที่งานครับ</p>
    </header>

    <div class="card qr-wrap" id="content">
      <div class="msg error show">ไม่พบข้อมูลการลงทะเบียน กรุณาลงทะเบียนใหม่</div>
    </div>

    <div class="links">
      <a href="/">← ลงทะเบียนอีกคน</a>
    </div>
  </div>

  <script>
    const raw = sessionStorage.getItem('regResult');
    const content = document.getElementById('content');
    if (raw) {
      const r = JSON.parse(raw);
      content.innerHTML = `
        <div class="icon" style="font-size:3rem">✅</div>
        <p>สวัสดีคุณ <strong>${escapeHtml(r.full_name)}</strong></p>
        <p style="color:var(--muted)">ขอบคุณสำหรับการลงทะเบียนเข้าร่วมงานสัมมนา<br />แล้วพบกันในวันงานนะครับ/ค่ะ 🎉</p>
        <img src="${r.qr}" alt="QR code เช็คอิน" />
        <div class="reg-code">${escapeHtml(r.reg_code)}</div>
        <p style="color:var(--muted)"><b>บันทึก QR นี้ไว้</b> แล้วแสดงกับเจ้าหน้าที่ที่หน้างานเพื่อเช็คอิน<br />(หรือแจ้งรหัสด้านบนก็ได้)</p>
        <button class="btn secondary auto" onclick="downloadQr('${r.qr}', '${escapeHtml(r.reg_code)}')">บันทึกรูป QR</button>
      `;
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function downloadQr(dataUrl, code) {
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = 'qr-' + code + '.png';
      a.click();
    }
  </script>
</body>
</html>
