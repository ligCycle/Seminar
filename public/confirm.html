<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ลงทะเบียนสำเร็จ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+Thai:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container">
    <header class="page-head">
      <h1>🎉 ลงทะเบียนสำเร็จ</h1>
      <p>ขอบคุณที่ลงทะเบียนเข้าร่วมงาน แล้วพบกันที่งานครับ</p>
    </header>

    <div class="card qr-wrap" id="content">
      <div class="msg error show">ไม่พบข้อมูลการลงทะเบียน กรุณาลงทะเบียนใหม่</div>
    </div>

    <div class="links">
      <a href="/">← ลงทะเบียนอีกคน</a>
    </div>
  </div>

  <script>
    const raw = sessionStorage.getItem('regResult');
    const content = document.getElementById('content');
    if (raw) {
      const r = JSON.parse(raw);
      content.innerHTML = `
        <div class="icon" style="font-size:3rem">✅</div>
        <p>สวัสดีคุณ <strong>${escapeHtml(r.full_name)}</strong></p>
        <p style="color:var(--muted)">เราได้บันทึกการลงทะเบียนของคุณเรียบร้อยแล้ว<br />แล้วพบกันที่งานครับ 🎉</p>
      `;
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
